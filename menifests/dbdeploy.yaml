apiVersion: apps/v1
kind: Deployment
metadata:
  name: vprodb-deployment
  labels:
    app: vprodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vprodb
  template:
    metadata:
      labels:
        app: vprodb
    spec:
      containers:
      - name: vprodb
        image: jeet1418/vprodb:v1
        volumeMounts:
        - name: vprodb-data
          mountPath: /var/lib/mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vpro-secret
              key: db-pass
        ports:
        - name: vprodb-port
          containerPort: 3306

      volumes:
      - name: vprodb-data
        persistentVolumeClaim:
          claimName: vprodb-pvc
          
# We are using an initContainer to clean up the data directory before starting the MySQL container. This is useful in scenarios where we want to ensure that the database starts with a clean state, especially during development or testing phases.

      initContainers:
      - name: busybox
        image: busybox
        args: ["rm", "-rf", "/var/lib/mysql/*"]
        volumeMounts:
        - name: vprodb-data
          mountPath: /var/lib/mysql
